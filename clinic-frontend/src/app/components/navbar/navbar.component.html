<div *ngIf="currentUser">
  <mat-toolbar class="custom-toolbar">

    
    <button mat-button class="clinic-title" routerLink="/dashboard">Pooja Dental Clinic</button>
    
    <span class="spacer"></span>
    
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
      Account
    </button>
    
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="navigateTo('/profile')">
        <span>Account Settings</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav 
      #sidenav 
      [opened]="sidenavOpened"
      [mode]="'over'"
      [fixedInViewport]="true"
      class="sidenav">
      
      <mat-nav-list>
        <a mat-list-item 
           *ngFor="let item of filteredMenuItems"
           (click)="navigateTo(item.route)"
           [class.active]="router.url === item.route">
          <span matLine>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
    
    <mat-sidenav-content class="main-content">
      <ng-content></ng-content>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
