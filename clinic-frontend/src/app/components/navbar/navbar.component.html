<div *ngIf="currentUser">
  <mat-toolbar color="primary">
    <button mat-icon-button (click)="toggleSidenav()" class="menu-button">
      <mat-icon>menu</mat-icon>
    </button>
    
    <button mat-button class="clinic-title" routerLink="/dashboard">Dental Clinic Management</button>
    
    <span class="spacer"></span>
    
    <span class="user-info">
      {{ currentUser.full_name }} ({{ currentUser.role | titlecase }})
    </span>
    
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
      <mat-icon>account_circle</mat-icon>
    </button>
    
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item (click)="navigateTo('/profile')">
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav 
      #sidenav 
      [opened]="sidenavOpened"
      [mode]="'over'"
      [fixedInViewport]="true"
      class="sidenav">
      
      <mat-nav-list>
        <a mat-list-item 
           *ngFor="let item of filteredMenuItems"
           (click)="navigateTo(item.route)"
           [class.active]="router.url === item.route">
          <mat-icon matListIcon>{{ item.icon }}</mat-icon>
          <span matLine>{{ item.label }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
    
    <mat-sidenav-content class="main-content">
      <ng-content></ng-content>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
